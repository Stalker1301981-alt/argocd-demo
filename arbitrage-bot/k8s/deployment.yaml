apiVersion: v1
kind: ConfigMap
metadata:
  name: arbitrage-bot-config
data:
  config.py: |
    NETWORK = "BNB Smart Chain (BSC)"
    RPC_URL = "https://bsc-dataseed.binance.org"

    PANCAKE_FACTORY_V2 = "0xBcF19165A48245dD2c632E1a108e673a8D6288F6"
    SUSHI_FACTORY_V2 = "0xc35DADB65012eC57965396DaE5a0345E751f3E91"
    APE_FACTORY_V2 = "0x084642BcC26687a567837dA8d27E6bD36694f247"
    BAKERY_FACTORY_V2 = "0xC0788A3a446dE4A2Eaaef4921382a521B5dF1F89"

    WATCHLIST = [
        ("USDT", "0x55d398326f99059fF775485246999027B3197955", "WBNB", "0xbb4CdB9CBd36B01bD1cBaEBf2De08d9173bc095c"),
        ("USDC", "0x8AC76a51cc950d9822D68b83FE1Ad11b56562675", "WBNB", "0xbb4CdB9CBd36B01bD1cBaEBf2De08d9173bc095c"),
        ("BTCB", "0x7130d2A12B9BCbFAe4f2634d864A1Ee1Ce3Fdc80", "WBNB", "0xbb4CdB9CBd36B01bD1cBaEBf2De08d9173bc095c")
    ]

    AMOUNT_USDT = 100
    SCAN_INTERVAL_SEC = 5
    MIN_PROFIT_PCT = 0.5

    FEE_PANCAKE = 997 / 1000
    FEE_SUSHI = 997 / 1000
    FEE_APE = 997 / 1000
    FEE_BAKERY = 995 / 1000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arbitrage-bot
  labels:
    app: arbitrage-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arbitrage-bot
  template:
    metadata:
      labels:
        app: arbitrage-bot
    spec:
      containers:
      - name: bot
        image: stalker1301981/arbitrage-bot:latest
        env:
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: arbitrage-bot-secret
              key: telegram_token
        - name: TELEGRAM_CHAT_ID
          valueFrom:
            secretKeyRef:
              name: arbitrage-bot-secret
              key: telegram_chat_id
        volumeMounts:
        - name: config
          mountPath: /app/src/config.py
          subPath: config.py
      volumes:
      - name: config
        configMap:
          name: arbitrage-bot-config
